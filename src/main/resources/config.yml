timezone: "America/New_York"

discord:
  token: "PUT_TOKEN_HERE"
  serverId: "PUT_SERVER_ID_HERE"
  forums:
    elections: "PUT_FORUM_ID_HERE"
    impeachment: "PUT_FORUM_ID_HERE"
    policyProposals: "PUT_FORUM_ID_HERE"
    polls: "PUT_FORUM_ID_HERE"
  channels:
    approvedChangesLog: "PUT_CHANNEL_ID_HERE"
    electionInfo: "PUT_CHANNEL_ID_HERE"

messages:
  electionOpenTitle: "Election Open - {period}"
  electionOpen: |-
    The presidential election is now open.
    Create a post in this forum to run for president.
    Voting uses thumbs up and thumbs down reactions.
    The candidate with the highest net thumbs up score wins.
    {minimum_votes_line}
    Election closes: {ends_at}
  electionResultTitle: "Election Result - {period}"
  electionWinner: |-
    Election winner: {winner_mention}
    Net score: {net_score}
    Thumbs up: {upvotes}
    Thumbs down: {downvotes}
    Next election starts: {next_start}
    Next election ends: {next_end}
  electionNoWinner: |-
    Election closed with no winner{tie_reason}
    Next election starts: {next_start}
    Next election ends: {next_end}
  policyProposalTitle: "Policy Proposal #{proposal_id} - {file}"
  policyProposal: |-
    Policy proposal by {proposer_mention}
    Proposal ID: `{proposal_id}`
    File: `{file}`
    Voting closes: {closes_at}
    Vote by thumbs up or thumbs down.
    If this post has a positive net score when voting closes, it will be implemented.
    {minimum_votes_line}

    ```diff
    {diff}
    ```
  approvedPolicy: |-
    Approved policy change processed: `{file}` by {proposer_mention}.
    {stage_status}

roles:
  autoCreateDiscordRoles: true
  president: "President"
  cabinetTier1: "Cabinet Tier 1"
  cabinetTier2: "Cabinet Tier 2"
  cabinetTier3: "Cabinet Tier 3"

luckPerms:
  autoCreateGroups: false
  groups:
    president: "president"
    cabinetTier1: "cabinet_tier_1"
    cabinetTier2: "cabinet_tier_2"
    cabinetTier3: "cabinet_tier_3"

elections:
  monthlyStartDay: 1
  monthlyEndDay: 7
  closeTime: "23:59"
  maxPresidentialWins: 2
  unlimitedWinsValue: -1
  minimumVotes: 0

impeachment:
  durationDays: 3
  minimumVotes: 0

specialElection:
  durationDays: 7
  minimumVotes: 0

cabinet:
  maxMembers: 3
  proposalLimit:
    amount: 1
    periodDays: 7
  presidentProposalLimit: -1

policy:
  durationDays: 7
  minimumVotes: 0
  maxFileBytes: 200000
  allowDiscordOwnerBypass: true
  allowDiscordManageServerBypass: false
  adminBypassRoles:
    - "Owner"
  pluginJarSearchPaths: []
  editableRoots:
    - "plugins/"
  allowedExtensions:
    - ".yml"
    - ".yaml"
    - ".json"
  excludedPaths:
    - "world/"
    - "world_nether/"
    - "world_the_end/"
    - "logs/"
    - "libraries/"
    - "versions/"
    - "cache/"
    - "crash-reports/"
    - "backups/"
    - "plugins/ElectionsPlugin/**"
    - "plugins/*.jar"
    - "plugins/**/*.jar"
    - "plugins/**/*.db"
    - "plugins/**/*.sqlite"
    - "plugins/**/*.sqlite3"
    - "plugins/**/.env"
    - "plugins/**/secrets.yml"
    - "plugins/**/secret.yml"
    - "plugins/**/credentials.json"
  secretPatterns:
    - "(?i)token\\s*[:=]"
    - "(?i)password\\s*[:=]"
    - "(?i)secret\\s*[:=]"
    - "(?i)api[_-]?key\\s*[:=]"
